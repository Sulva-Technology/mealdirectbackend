openapi: 3.0.0
paths:
  /v1/health/live:
    get:
      operationId: HealthController_live
      parameters: []
      responses:
        '200':
          description: The API process is running.
      tags: &a1
        - health
  /v1/health/ready:
    get:
      operationId: HealthController_ready
      parameters: []
      responses:
        '200':
          description: The API is ready to serve traffic.
        '503':
          description: A required dependency is unavailable.
      tags: *a1
  /v1/operations/status:
    get:
      operationId: OperationsController_status
      parameters: []
      responses:
        '200':
          description: Internal operational status for authorized administrators.
        '401':
          description: Operations token missing or invalid.
      security:
        - operationsToken: []
      tags:
        - operations
  /v1/auth/me:
    get:
      operationId: AuthController_me
      parameters: []
      responses:
        '200':
          description: The authenticated Meal Direct actor context.
        '401':
          description: Missing, invalid, or expired Supabase JWT.
      security:
        - supabaseAuth: []
      tags:
        - auth
  /v1/me:
    get:
      operationId: ProfilesController_me
      parameters: []
      responses:
        '200':
          description: Current role-aware Meal Direct session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeSessionEnvelopeDto'
        '401': &a2
          description: Missing, invalid, or expired Supabase JWT.
      security: &a3
        - supabaseAuth: []
      tags: &a4
        - me
    patch:
      operationId: ProfilesController_updateProfile
      parameters: []
      responses:
        '200':
          description: Updated safe profile fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileEnvelopeDto'
        '400':
          description: Invalid profile input.
        '401': *a2
      security: *a3
      tags: *a4
  /v1/me/campuses:
    get:
      operationId: ProfilesController_campuses
      parameters: []
      responses:
        '200':
          description: Active campus memberships for the current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampusMembershipListEnvelopeDto'
        '401': *a2
      security: *a3
      tags: *a4
  /v1/me/complete-onboarding:
    post:
      operationId: ProfilesController_completeOnboarding
      parameters: []
      responses:
        '200':
          description: Profile after onboarding completion.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileEnvelopeDto'
        '400':
          description: Invalid onboarding input.
        '401': *a2
        '403':
          description: User does not belong to the selected campus.
      security: *a3
      tags: *a4
  /v1/me/default-location:
    put:
      operationId: ProfilesController_setDefaultLocation
      parameters: []
      responses:
        '200':
          description: Profile after default location update.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileEnvelopeDto'
        '400':
          description: Invalid default location input.
        '401': *a2
        '403':
          description: User does not belong to the selected campus.
      security: *a3
      tags: *a4
  /v1/campuses:
    get:
      operationId: PublicCampusDirectoryController_listCampuses
      parameters: []
      responses:
        '200':
          description: Active campuses available to public clients.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampusListEnvelopeDto'
      tags: &a5
        - campuses
  /v1/campuses/{campusId}/locations:
    get:
      operationId: PublicCampusDirectoryController_listLocations
      parameters: []
      responses:
        '200':
          description: Active preset delivery locations for a campus.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationListEnvelopeDto'
        '400':
          description: Invalid campus ID.
      tags: *a5
  /v1/campuses/{campusId}/delivery-slots:
    get:
      operationId: PublicCampusDirectoryController_listDeliverySlots
      parameters: []
      responses:
        '200':
          description: Active delivery slots for a campus, optionally with date cutoffs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliverySlotListEnvelopeDto'
        '400':
          description: Invalid campus ID or date filter.
      tags: *a5
  /v1/admin/campuses:
    get:
      operationId: AdminCampusDirectoryController_listCampuses
      parameters: []
      responses:
        '200':
          description: Admin-visible campuses.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampusListEnvelopeDto'
        '401': &a6
          description: Missing, invalid, or expired Supabase JWT.
        '403': &a7
          description: Admin role is required.
      security: &a8
        - supabaseAuth: []
      tags: &a9
        - admin-campuses
    post:
      operationId: AdminCampusDirectoryController_createCampus
      parameters: []
      responses:
        '200':
          description: Created campus.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampusEnvelopeDto'
        '400':
          description: Invalid campus input.
        '401': *a6
        '403': *a7
      security: *a8
      tags: *a9
  /v1/admin/campuses/{campusId}:
    patch:
      operationId: AdminCampusDirectoryController_updateCampus
      parameters: []
      responses:
        '200':
          description: Updated campus.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampusEnvelopeDto'
        '400':
          description: Invalid campus input.
        '401': *a6
        '403': *a7
      security: *a8
      tags: *a9
  /v1/admin/campuses/{campusId}/zones:
    get:
      operationId: AdminCampusDirectoryController_listZones
      parameters: []
      responses:
        '200':
          description: Campus zones for admins.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZoneListEnvelopeDto'
        '401': *a6
        '403': *a7
      security: *a8
      tags: *a9
    post:
      operationId: AdminCampusDirectoryController_createZone
      parameters: []
      responses:
        '200':
          description: Created campus zone.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZoneEnvelopeDto'
        '401': *a6
        '403': *a7
      security: *a8
      tags: *a9
  /v1/admin/zones/{zoneId}:
    patch:
      operationId: AdminCampusDirectoryController_updateZone
      parameters: []
      responses:
        '200':
          description: Updated campus zone.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZoneEnvelopeDto'
        '401': *a6
        '403': *a7
      security: *a8
      tags: *a9
  /v1/admin/campuses/{campusId}/locations:
    get:
      operationId: AdminCampusDirectoryController_listLocations
      parameters: []
      responses:
        '200':
          description: Campus locations for admins.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationListEnvelopeDto'
        '401': *a6
        '403': *a7
      security: *a8
      tags: *a9
    post:
      operationId: AdminCampusDirectoryController_createLocation
      parameters: []
      responses:
        '200':
          description: Created campus location.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationEnvelopeDto'
        '401': *a6
        '403': *a7
      security: *a8
      tags: *a9
  /v1/admin/locations/{locationId}:
    patch:
      operationId: AdminCampusDirectoryController_updateLocation
      parameters: []
      responses:
        '200':
          description: Updated campus location.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationEnvelopeDto'
        '401': *a6
        '403': *a7
      security: *a8
      tags: *a9
  /v1/admin/campuses/{campusId}/delivery-slots:
    get:
      operationId: AdminCampusDirectoryController_listDeliverySlots
      parameters: []
      responses:
        '200':
          description: Campus delivery slots for admins.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliverySlotListEnvelopeDto'
        '401': *a6
        '403': *a7
      security: *a8
      tags: *a9
    post:
      operationId: AdminCampusDirectoryController_createDeliverySlot
      parameters: []
      responses:
        '200':
          description: Created campus delivery slot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliverySlotEnvelopeDto'
        '401': *a6
        '403': *a7
      security: *a8
      tags: *a9
  /v1/admin/delivery-slots/{slotId}:
    patch:
      operationId: AdminCampusDirectoryController_updateDeliverySlot
      parameters: []
      responses:
        '200':
          description: Updated campus delivery slot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliverySlotEnvelopeDto'
        '401': *a6
        '403': *a7
      security: *a8
      tags: *a9
  /v1/catalog/vendors:
    get:
      operationId: CatalogController_listVendors
      parameters: []
      responses:
        '200':
          description: Approved active vendors available for the selected campus/date/slot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogVendorListEnvelopeDto'
        '400':
          description: Invalid catalog filters.
      tags: &a10
        - catalog
  /v1/catalog/vendors/{vendorId}:
    get:
      operationId: CatalogController_getVendor
      parameters: []
      responses:
        '200':
          description: Approved active vendor detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogVendorEnvelopeDto'
        '400':
          description: Invalid vendor ID.
        '404':
          description: Vendor not found or unavailable.
      tags: *a10
  /v1/catalog/vendors/{vendorId}/menu:
    get:
      operationId: CatalogController_listVendorMenu
      parameters: []
      responses:
        '200':
          description: Approved active menu items for the vendor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItemListEnvelopeDto'
        '400':
          description: Invalid vendor ID or menu filters.
      tags: *a10
  /v1/orders:
    post:
      operationId: OrdersController_createOrder
      parameters: []
      responses:
        '201':
          description: Order was created idempotently and inventory was reserved.
      security:
        - supabaseAuth: []
      tags:
        - orders
  /v1/payments/webhooks/paystack:
    post:
      operationId: PaystackWebhookController_handlePaystackWebhook
      parameters: []
      responses:
        '202':
          description: Paystack webhook was verified and accepted idempotently.
        '401':
          description: Missing or invalid Paystack signature.
      tags:
        - payments
  /v1/settlements/vendors/{vendorId}/daily:
    post:
      operationId: SettlementsController_generateVendorDailySettlement
      parameters: []
      responses:
        '201':
          description: Vendor daily settlement was generated idempotently.
      security: &a11
        - supabaseAuth: []
      tags: &a12
        - settlements
  /v1/settlements/riders/{riderId}/daily:
    post:
      operationId: SettlementsController_generateRiderDailySettlement
      parameters: []
      responses:
        '201':
          description: Rider daily settlement was generated idempotently.
      security: *a11
      tags: *a12
info:
  title: Meal Direct API
  description: Stable REST API for Meal Direct web and future mobile clients.
  version: 1.0.0
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    supabaseAuth:
      scheme: bearer
      bearerFormat: Supabase JWT
      type: http
      description: Supabase Auth access token.
    idempotencyKey:
      type: apiKey
      in: header
      name: Idempotency-Key
      description: Required for important mutations such as order creation and payments.
    requestId:
      type: apiKey
      in: header
      name: x-request-id
      description: Optional caller-provided request ID. The API echoes or generates one.
    operationsToken:
      scheme: bearer
      bearerFormat: JWT
      type: http
      description: Internal operations token. Temporary until Super Admin JWT/RBAC is
        implemented.
  schemas:
    MeActorDto:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        role:
          type: string
          enum: &a13
            - customer
            - vendor
            - rider
            - campus_admin
            - super_admin
        email:
          type: string
        campusId:
          type: string
          format: uuid
        vendorId:
          type: string
          format: uuid
        riderId:
          type: string
          format: uuid
      required:
        - userId
        - role
    ProfileRecordDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          nullable: true
        displayName:
          type: string
          nullable: true
        phoneNumber:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        accountStatus:
          type: string
          enum:
            - active
            - suspended
            - deactivated
        defaultCampusId:
          type: string
          format: uuid
          nullable: true
        defaultLocationId:
          type: string
          format: uuid
          nullable: true
        onboardingCompletedAt:
          type: string
          nullable: true
        onboardingCompleted:
          type: boolean
        lastSeenAt:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - accountStatus
        - onboardingCompleted
        - createdAt
        - updatedAt
    CampusMembershipDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        campusId:
          type: string
          format: uuid
        campusName:
          type: string
        campusSlug:
          type: string
        timezone:
          type: string
        currency:
          type: string
        countryCode:
          type: string
        active:
          type: boolean
        joinedAt:
          type: string
      required:
        - id
        - campusId
        - campusName
        - campusSlug
        - timezone
        - currency
        - countryCode
        - active
        - joinedAt
    VendorMembershipDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        vendorId:
          type: string
          format: uuid
        campusId:
          type: string
          format: uuid
        vendorDisplayName:
          type: string
        vendorSlug:
          type: string
        role:
          type: string
          enum:
            - owner
            - staff
        active:
          type: boolean
      required:
        - id
        - vendorId
        - campusId
        - vendorDisplayName
        - vendorSlug
        - role
        - active
    RiderProfileDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        campusId:
          type: string
          format: uuid
        displayName:
          type: string
        phone:
          type: string
        status:
          type: string
          enum:
            - pending
            - verified
            - suspended
            - deactivated
        active:
          type: boolean
      required:
        - id
        - campusId
        - displayName
        - phone
        - status
        - active
    AdminMembershipDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        campusId:
          type: string
          format: uuid
          nullable: true
        campusName:
          type: string
          nullable: true
        role:
          type: string
          enum:
            - campus_admin
            - super_admin
        active:
          type: boolean
        grantedAt:
          type: string
      required:
        - id
        - role
        - active
        - grantedAt
    MeSessionDto:
      type: object
      properties:
        actor:
          $ref: '#/components/schemas/MeActorDto'
        profile:
          $ref: '#/components/schemas/ProfileRecordDto'
        roles:
          type: array
          items:
            type: string
            enum: *a13
        campuses:
          type: array
          items:
            $ref: '#/components/schemas/CampusMembershipDto'
        vendorMemberships:
          type: array
          items:
            $ref: '#/components/schemas/VendorMembershipDto'
        riderProfiles:
          type: array
          items:
            $ref: '#/components/schemas/RiderProfileDto'
        adminMemberships:
          type: array
          items:
            $ref: '#/components/schemas/AdminMembershipDto'
      required:
        - actor
        - profile
        - roles
        - campuses
        - vendorMemberships
        - riderProfiles
        - adminMemberships
    MeSessionEnvelopeDto:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/MeSessionDto'
      required:
        - data
    CampusMembershipListEnvelopeDto:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CampusMembershipDto'
      required:
        - data
    ProfileEnvelopeDto:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/ProfileRecordDto'
      required:
        - data
    CampusRecordDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        timezone:
          type: string
        currency:
          type: string
        countryCode:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - slug
        - timezone
        - currency
        - countryCode
        - active
        - createdAt
        - updatedAt
    CampusListEnvelopeDto:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CampusRecordDto'
      required:
        - data
    CampusLocationRecordDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        campusId:
          type: string
          format: uuid
        zoneId:
          type: string
          format: uuid
        zoneName:
          type: string
        zoneCode:
          type: string
        name:
          type: string
        slug:
          type: string
        type:
          type: string
          enum:
            - department
            - hostel
        deliveryInstructions:
          type: string
          nullable: true
        active:
          type: boolean
        displayOrder:
          type: number
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - campusId
        - zoneId
        - zoneName
        - zoneCode
        - name
        - slug
        - type
        - active
        - displayOrder
        - createdAt
        - updatedAt
    LocationListEnvelopeDto:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CampusLocationRecordDto'
      required:
        - data
    DeliverySlotRecordDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        campusId:
          type: string
          format: uuid
        name:
          type: string
        deliveryTime:
          type: string
        cutoffMinutes:
          type: number
        active:
          type: boolean
        displayOrder:
          type: number
        orderingCutoffAt:
          type: string
          nullable: true
        acceptingOrders:
          type: boolean
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - campusId
        - name
        - deliveryTime
        - cutoffMinutes
        - active
        - displayOrder
        - createdAt
        - updatedAt
    DeliverySlotListEnvelopeDto:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DeliverySlotRecordDto'
      required:
        - data
    CampusEnvelopeDto:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/CampusRecordDto'
      required:
        - data
    CampusZoneRecordDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        campusId:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
        active:
          type: boolean
        displayOrder:
          type: number
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - campusId
        - name
        - code
        - active
        - displayOrder
        - createdAt
        - updatedAt
    ZoneListEnvelopeDto:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CampusZoneRecordDto'
      required:
        - data
    ZoneEnvelopeDto:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/CampusZoneRecordDto'
      required:
        - data
    LocationEnvelopeDto:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/CampusLocationRecordDto'
      required:
        - data
    DeliverySlotEnvelopeDto:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/DeliverySlotRecordDto'
      required:
        - data
    CatalogVendorDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        campusId:
          type: string
          format: uuid
        displayName:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        kitchenLocation:
          type: string
          nullable: true
        defaultDeliveryMode:
          type: string
          enum:
            - meal_direct_rider
            - vendor_delivery
      required:
        - id
        - campusId
        - displayName
        - slug
        - defaultDeliveryMode
    CatalogVendorListEnvelopeDto:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CatalogVendorDto'
      required:
        - data
    CatalogVendorEnvelopeDto:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/CatalogVendorDto'
      required:
        - data
    MenuItemDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        vendorId:
          type: string
          format: uuid
        categoryId:
          type: string
          format: uuid
          nullable: true
        categoryName:
          type: string
          nullable: true
        unitTypeId:
          type: string
          format: uuid
        unitCode:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        priceKobo:
          type: number
        remainingQuantity:
          type: number
          nullable: true
      required:
        - id
        - vendorId
        - unitTypeId
        - unitCode
        - name
        - priceKobo
    MenuItemListEnvelopeDto:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/MenuItemDto'
      required:
        - data
    CursorPaginationMetaDto:
      type: object
      properties:
        hasMore:
          type: boolean
          description: True when another page is available.
        limit:
          type: number
          description: Limit applied to the current page.
          minimum: 1
        nextCursor:
          type: string
          description: Cursor to request the next page.
      required:
        - hasMore
        - limit
    CursorPaginationQueryDto:
      type: object
      properties:
        cursor:
          type: string
          description: Opaque cursor returned by the previous page.
          example: eyJpZCI6Im9yZGVyLTEifQ
        limit:
          type: number
          description: Maximum number of records to return.
          default: 20
          maximum: 100
          minimum: 1
    DateRangeQueryDto:
      type: object
      properties:
        dateFrom:
          type: string
          description: Inclusive ISO-8601 lower bound for date filtering.
          example: 2026-06-15T00:00:00.000Z
        dateTo:
          type: string
          description: Inclusive ISO-8601 upper bound for date filtering.
          example: 2026-06-16T00:00:00.000Z
    ErrorBodyDto:
      type: object
      properties:
        code:
          type: string
          example: VALIDATION_FAILED
        message:
          type: string
          example: Request validation failed
        requestId:
          type: string
          description: Request identifier for support and log correlation.
        details:
          description: Safe machine-readable error details.
          type: array
          items:
            type: object
      required:
        - code
        - message
    ErrorEnvelopeDto:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/ErrorBodyDto'
      required:
        - error
    ListEnvelopeDto:
      type: object
      properties:
        data:
          description: Response list payload.
          type: array
          items:
            type: object
        pagination:
          $ref: '#/components/schemas/CursorPaginationMetaDto'
        meta:
          type: object
          description: Optional response metadata.
      required:
        - data
        - pagination
    MoneyDto:
      type: object
      properties:
        amountCents:
          type: number
          description: Amount in the smallest currency unit.
          example: 250000
          minimum: 0
        currency:
          type: string
          description: ISO-4217 uppercase currency code.
          example: NGN
          pattern: ^[A-Z]{3}$
      required:
        - amountCents
        - currency
    SortQueryDto:
      type: object
      properties:
        sort:
          type: string
          description: Sort expression in field:direction form, or -field for descending.
          example: createdAt:desc
    StatusQueryDto:
      type: object
      properties:
        status:
          type: string
          description: Module-specific status filter.
    SuccessEnvelopeDto:
      type: object
      properties:
        data:
          type: object
          description: Response payload.
        meta:
          type: object
          description: Optional response metadata.
      required:
        - data
    UuidParamDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
      required:
        - id
