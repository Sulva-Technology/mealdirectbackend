      security: &a19
        - supabaseAuth: []
      tags: &a20
        - orders
  /v1/orders:
    get:
      operationId: OrdersController_listOrders
      parameters: []
      responses:
        '200':
          description: Customer order history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderListEnvelopeDto'
      security: *a19
      tags: *a20
    post:
      operationId: OrdersController_createOrder
      parameters: []
      responses:
        '201':
          description: Order was created idempotently and inventory was reserved.
      security: *a19
      tags: *a20
  /v1/orders/{orderId}/payment-status:
    get:
      operationId: OrdersController_paymentStatus
      parameters: []
      responses:
        '200':
          description: Customer-visible payment status for an order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderPaymentStatusEnvelopeDto'
      security: *a19
      tags: *a20
  /v1/orders/{orderId}/confirm-delivery:
    post:
      operationId: OrdersController_confirmDelivery
      parameters: []
      responses:
        '200':
          description: Customer delivery confirmation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryConfirmationEnvelopeDto'
      security: *a19
      tags: *a20
  /v1/orders/{orderId}:
    get:
      operationId: OrdersController_getOrder
      parameters: []
      responses:
        '200':
          description: Customer-owned order detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetailEnvelopeDto'
      security: *a19
      tags: *a20
  /v1/orders/{orderId}/payments/paystack/initialize:
    post:
      operationId: CustomerPaymentsController_initializePaystack
      parameters:
        - name: orderId
          required: true
          in: path
          schema:
            format: uuid
            type: string
      responses:
        '200':
          description: Paystack checkout initialization for a customer-owned pending order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaystackInitializationEnvelopeDto'
        '400':
          description: Invalid order or payment state.
        '401':
          description: Missing, invalid, or expired Supabase JWT.
      security:
        - supabaseAuth: []
      tags:
        - payments
  /v1/admin/payments:
    get:
      operationId: AdminPaymentsController_listPayments
      parameters: []
      responses:
        '200':
          description: Admin-visible payment records scoped by campus for campus admins.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminPaymentListEnvelopeDto'
        '401': &a21
          description: Missing, invalid, or expired Supabase JWT.
        '403': &a22
          description: Admin role is required.
      security: &a23
        - supabaseAuth: []
      tags: &a24
        - admin-payments
  /v1/admin/payments/{paymentId}:
    get:
      operationId: AdminPaymentsController_getPayment
      parameters:
        - name: paymentId
          required: true
          in: path
          schema:
            format: uuid
            type: string
      responses:
        '200':
          description: Admin-visible payment detail scoped by campus for campus admins.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminPaymentEnvelopeDto'
        '401': *a21
        '403': *a22
      security: *a23
      tags: *a24
  /v1/admin/payments/{paymentId}/reconcile:
    post:
      operationId: AdminPaymentsController_reconcilePayment
      parameters:
        - name: paymentId
          required: true
          in: path
          schema:
            format: uuid
            type: string
      responses:
        '200':
          description: Verifies a Paystack transaction and marks the local payment
            successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentReconciliationEnvelopeDto'
        '401': *a21
        '403': *a22
      security: *a23
      tags: *a24
  /v1/admin/payments/{paymentId}/refunds:
    post:
      operationId: AdminPaymentsController_initiateRefund
      parameters:
        - name: paymentId
          required: true
          in: path
          schema:
            format: uuid
            type: string
      responses:
        '201':
          description: Creates a bounded Paystack refund for a successful payment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefundEnvelopeDto'
        '401': *a21
        '403': *a22
      security: *a23
      tags: *a24
  /v1/payments/webhooks/paystack:
    post:
      operationId: PaystackWebhookController_handlePaystackWebhook
      parameters: []
      responses:
        '202':
          description: Paystack webhook was verified and accepted idempotently.
        '401':
          description: Missing or invalid Paystack signature.
      tags:
        - payments
  /v1/settlements/vendors/{vendorId}/daily:
    post:
      operationId: SettlementsController_generateVendorDailySettlement
      parameters: []
      responses:
        '201':
          description: Vendor daily settlement was generated idempotently.
      security: &a25
        - supabaseAuth: []
      tags: &a26
        - settlements
  /v1/settlements/riders/{riderId}/daily:
    post:
      operationId: SettlementsController_generateRiderDailySettlement
      parameters: []
      responses:
        '201':
          description: Rider daily settlement was generated idempotently.
      security: *a25
      tags: *a26
  /v1/orders/{orderId}/review:
    post:
      operationId: CustomerReviewsController_createReview
      parameters:
        - name: orderId
          required: true
          in: path
          schema:
            format: uuid
            type: string
      responses:
        '201':
          description: Created or existing customer review for an owned confirmed order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewEnvelopeDto'
        '400':
          description: Invalid review input or ineligible order.
        '401':
          description: Missing, invalid, or expired Supabase JWT.
      security:
        - supabaseAuth: []
      tags:
        - reviews
  /v1/orders/{orderId}/escalations:
    get:
      operationId: CustomerEscalationsController_listEscalations
      parameters:
        - name: orderId
          required: true
          in: path
          schema:
            format: uuid
            type: string
      responses:
        '200':
          description: Customer-visible escalations for an owned order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EscalationListEnvelopeDto'
        '401': &a27
          description: Missing, invalid, or expired Supabase JWT.
      security: &a28
        - supabaseAuth: []
      tags: &a29
        - escalations
    post:
      operationId: CustomerEscalationsController_openEscalation
      parameters:
        - name: orderId
          required: true
          in: path
          schema:
            format: uuid
            type: string
      responses:
        '201':
          description: Opened or existing customer escalation for an owned eligible order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EscalationEnvelopeDto'
        '400':
          description: Invalid escalation input or ineligible order.
        '401': *a27
      security: *a28
      tags: *a29
  /v1/notifications:
    get:
      operationId: NotificationsController_listNotifications
      parameters: []
      responses:
        '200':
          description: Current user notification feed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListEnvelopeDto'
        '401': &a30
          description: Missing, invalid, or expired Supabase JWT.
      security: &a31
        - supabaseAuth: []
      tags: &a32
        - notifications
  /v1/notifications/read-all:
    post:
      operationId: NotificationsController_markAllRead
      parameters: []
      responses:
        '200':
          description: Marks all current user notifications as read.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarkAllNotificationsReadEnvelopeDto'
        '401': *a30
      security: *a31
      tags: *a32
  /v1/notifications/{notificationId}/read:
    post:
      operationId: NotificationsController_markRead
      parameters:
        - name: notificationId
          required: true
          in: path
          schema:
            format: uuid
            type: string
      responses:
        '200':
          description: Marks one current user notification as read.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationEnvelopeDto'
        '401': *a30
      security: *a31
      tags: *a32
  /v1/notifications/preferences:
    get:
      operationId: NotificationsController_getPreferences
      parameters: []
      responses:
        '200':
          description: Current user notification preferences.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreferencesEnvelopeDto'
        '401': *a30
      security: *a31
      tags: *a32
    put:
      operationId: NotificationsController_updatePreferences
      parameters: []
      responses:
        '200':
          description: Updated current user notification preferences.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreferencesEnvelopeDto'
        '401': *a30
      security: *a31
      tags: *a32
info:
  title: Meal Direct API
  description: Stable REST API for Meal Direct web and future mobile clients.
  version: 1.0.0
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    supabaseAuth:
      scheme: bearer
      bearerFormat: Supabase JWT
      type: http
      description: Supabase Auth access token.
    idempotencyKey:
      type: apiKey
      in: header
      name: Idempotency-Key
      description: Required for important mutations such as order creation and payments.
    requestId:
      type: apiKey
      in: header
      name: x-request-id
      description: Optional caller-provided request ID. The API echoes or generates one.
    operationsToken:
      scheme: bearer
      bearerFormat: JWT
      type: http
      description: Internal operations token. Temporary until Super Admin JWT/RBAC is
        implemented.
  schemas:
    MeActorDto:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        role:
          type: string
          enum: &a33
            - customer
            - vendor
            - rider
            - campus_admin
            - super_admin
        email:
          type: string
        campusId:
          type: string
          format: uuid
        vendorId:
          type: string
          format: uuid
        riderId:
          type: string
          format: uuid
      required:
        - userId
        - role
    ProfileRecordDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          nullable: true
        displayName:
          type: string
          nullable: true
        phoneNumber:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        accountStatus:
          type: string
          enum:
            - active
            - suspended
            - deactivated
        defaultCampusId:
          type: string
          format: uuid
          nullable: true
        defaultLocationId:
          type: string
          format: uuid
          nullable: true
        onboardingCompletedAt:
          type: string
          nullable: true
        onboardingCompleted:
          type: boolean
        lastSeenAt:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - accountStatus
        - onboardingCompleted
        - createdAt
        - updatedAt
    CampusMembershipDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        campusId:
          type: string
          format: uuid
        campusName:
          type: string
        campusSlug:
          type: string
        timezone:
          type: string
        currency:
          type: string
        countryCode:
          type: string
        active:
          type: boolean
        joinedAt:
          type: string
      required:
        - id
        - campusId
        - campusName
        - campusSlug
        - timezone
        - currency
        - countryCode
        - active
        - joinedAt
    VendorMembershipDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        vendorId:
          type: string
          format: uuid
        campusId:
          type: string
          format: uuid
        vendorDisplayName:
          type: string
        vendorSlug:
          type: string
        role:
          type: string
          enum:
            - owner
            - staff
        active:
          type: boolean
      required:
        - id
        - vendorId
        - campusId
        - vendorDisplayName
        - vendorSlug
        - role
        - active
    RiderProfileDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        campusId:
          type: string
          format: uuid
        displayName:
          type: string
        phone:
          type: string
        status:
          type: string
          enum:
            - pending
            - verified
            - suspended
            - deactivated
        active:
          type: boolean
      required:
        - id
        - campusId
        - displayName
        - phone
        - status
        - active
    AdminMembershipDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        campusId:
          type: string
          format: uuid
          nullable: true
        campusName:
          type: string
          nullable: true
        role:
          type: string
          enum:
            - campus_admin
            - super_admin
        active:
          type: boolean
        grantedAt:
          type: string
      required:
        - id
        - role
        - active
        - grantedAt
    MeSessionDto:
      type: object
      properties:
        actor:
          $ref: '#/components/schemas/MeActorDto'
        profile:
          $ref: '#/components/schemas/ProfileRecordDto'
        roles:
          type: array
          items:
            type: string
            enum: *a33
        campuses:
          type: array
          items:
            $ref: '#/components/schemas/CampusMembershipDto'
        vendorMemberships:
          type: array
          items:
            $ref: '#/components/schemas/VendorMembershipDto'
        riderProfiles:
          type: array
          items:
            $ref: '#/components/schemas/RiderProfileDto'
        adminMemberships:
          type: array
          items:
            $ref: '#/components/schemas/AdminMembershipDto'
      required:
        - actor
        - profile
        - roles
        - campuses
        - vendorMemberships
        - riderProfiles
        - adminMemberships
    MeSessionEnvelopeDto:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/MeSessionDto'
      required:
        - data
    CampusMembershipListEnvelopeDto:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CampusMembershipDto'
      required:
        - data
    ProfileEnvelopeDto:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/ProfileRecordDto'
      required:
        - data
    CampusRecordDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        timezone:
          type: string
        currency:
          type: string
        countryCode:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - slug
        - timezone
        - currency
        - countryCode
        - active
        - createdAt
        - updatedAt
    CampusListEnvelopeDto:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CampusRecordDto'
      required:
        - data
    CampusLocationRecordDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        campusId:
          type: string
          format: uuid
        zoneId:
          type: string
          format: uuid
        zoneName:
          type: string
        zoneCode:
          type: string
        name:
          type: string
        slug:
          type: string
        type:
          type: string
          enum:
            - department
            - hostel
        deliveryInstructions:
          type: string
          nullable: true
        active:
          type: boolean
        displayOrder:
          type: number
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - campusId
        - zoneId
        - zoneName
        - zoneCode
        - name
        - slug
        - type
        - active
        - displayOrder
        - createdAt
        - updatedAt
    LocationListEnvelopeDto:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CampusLocationRecordDto'
      required:
        - data
    DeliverySlotRecordDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        campusId:
          type: string
          format: uuid
        name:
          type: string
        deliveryTime:
          type: string
        cutoffMinutes:
          type: number
        active:
          type: boolean
        displayOrder:
          type: number
        orderingCutoffAt:
          type: string
          nullable: true
        acceptingOrders:
          type: boolean
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - campusId
        - name
        - deliveryTime
        - cutoffMinutes
        - active
        - displayOrder
        - createdAt
        - updatedAt
    DeliverySlotListEnvelopeDto:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DeliverySlotRecordDto'
      required:
        - data
    CampusEnvelopeDto:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/CampusRecordDto'
      required:
        - data
    CampusZoneRecordDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        campusId:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
        active:
          type: boolean
        displayOrder:
          type: number
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - campusId
        - name
        - code
        - active
        - displayOrder
        - createdAt
        - updatedAt
    ZoneListEnvelopeDto:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CampusZoneRecordDto'
      required:
        - data
    ZoneEnvelopeDto:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/CampusZoneRecordDto'
      required:
        - data
    LocationEnvelopeDto:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/CampusLocationRecordDto'
      required:
        - data
    DeliverySlotEnvelopeDto:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/DeliverySlotRecordDto'
      required:
        - data
    VendorProfileDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        campusId:
          type: string
          format: uuid
        legalName:
          type: string
        displayName:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        kitchenLocation:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - approved
            - deactivated
            - pending
            - suspended
        active:
          type: boolean
        defaultDeliveryMode:
          type: string
          enum: &a34
            - meal_direct_rider
            - vendor_delivery
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - campusId
        - legalName
        - displayName
        - slug
        - status
        - active
        - defaultDeliveryMode
        - createdAt
        - updatedAt
    VendorProfileEnvelopeDto:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/VendorProfileDto'
      required:
        - data
    UpdateVendorProfileDto:
      type: object
      properties:
        displayName:
          type: string
          maxLength: 160
          minLength: 1
        description:
          type: string
          maxLength: 1000
          nullable: true
        phone:
          type: string
          pattern: ^[+0-9][0-9 ()-]{6,24}$
          nullable: true
        email:
          type: string
          nullable: true
        logoUrl:
          type: string
          maxLength: 2048
          nullable: true
        kitchenLocation:
          type: string
          maxLength: 300
          nullable: true
        defaultDeliveryMode:
          type: string
          enum: *a34
    VendorPayoutAccountDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        vendorId:
          type: string
          format: uuid
        paystackRecipientCode:
          type: string
          nullable: true
        bankName:
          type: string
        bankCode:
          type: string
          nullable: true
        maskedAccountNumber:
          type: string
        accountName:
          type: string
        verifiedAt:
          type: string
          nullable: true
        active:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - vendorId
        - bankName
        - maskedAccountNumber
        - accountName
        - active
        - createdAt
        - updatedAt
    VendorPayoutAccountEnvelopeDto:
      type: object
      properties:
        data:
          nullable: true
          type: object
          allOf:
            - $ref: '#/components/schemas/VendorPayoutAccountDto'
      required:
        - data
    UpsertPayoutAccountDto:
      type: object
      properties:
        bankName:
          type: string
          maxLength: 120
          minLength: 1
        bankCode:
          type: string
          maxLength: 20
          minLength: 1
        accountName:
          type: string
          maxLength: 160
          minLength: 1
        accountNumber:
          type: string
          description: Full account number for masking before storage.
        paystackRecipientCode:
          type: string
          maxLength: 80
          minLength: 1
      required:
        - bankName
        - accountName
        - accountNumber
    MenuCategoryDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        vendorId:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        active:
          type: boolean
        displayOrder:
          type: number
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - vendorId
        - name
        - slug
        - active
        - displayOrder
        - createdAt
        - updatedAt
    UnitTypeDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        displayName:
          type: string
        countsTowardSpoonLimit:
          type: boolean
        active:
          type: boolean
      required:
        - id
        - code
        - displayName
        - countsTowardSpoonLimit
        - active
    MenuMetadataDto:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: '#/components/schemas/MenuCategoryDto'
        unitTypes:
          type: array
          items:
            $ref: '#/components/schemas/UnitTypeDto'
      required:
        - categories
        - unitTypes
    MenuMetadataEnvelopeDto:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/MenuMetadataDto'
      required:
        - data
    VendorMenuItemDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        vendorId:
          type: string
          format: uuid
        categoryId:
          type: string
          format: uuid
          nullable: true
        categoryName:
          type: string
          nullable: true
        unitTypeId:
          type: string
          format: uuid
        unitCode:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        priceKobo:
          type: number
        active:
          type: boolean
        displayOrder:
          type: number
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - vendorId
        - unitTypeId
        - unitCode
        - name
        - priceKobo
        - active
        - displayOrder
        - createdAt
        - updatedAt
    VendorMenuItemListEnvelopeDto:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/VendorMenuItemDto'
      required:
        - data
    CreateMenuItemDto:
      type: object
      properties:
        categoryId:
          type: string
          format: uuid
          nullable: true
        unitTypeId:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 180
          minLength: 1
        description:
          type: string
          maxLength: 1000
          nullable: true
        imageUrl:
          type: string
          maxLength: 2048
          nullable: true
        priceKobo:
          type: number
          minimum: 0
        displayOrder:
          type: number
          minimum: 0
      required:
        - unitTypeId
        - name
        - priceKobo
    VendorMenuItemEnvelopeDto:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/VendorMenuItemDto'
      required:
        - data
    UpdateMenuItemDto:
      type: object
      properties:
        categoryId:
          type: string
          format: uuid
          nullable: true
        unitTypeId:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 180
          minLength: 1
        description:
          type: string
          maxLength: 1000
          nullable: true
        imageUrl:
          type: string
          maxLength: 2048
          nullable: true
        priceKobo:
          type: number
          minimum: 0
        displayOrder:
          type: number
          minimum: 0
    AvailabilityEntryResponseDto:
      type: object
      properties:
        deliverySlotId:
          type: string
          format: uuid
        dayOfWeek:
          type: number
          maximum: 6
          minimum: 0
        available:
          type: boolean
        validFrom:
          type: string
          example: 2026-06-15
          nullable: true
        validUntil:
          type: string
          example: 2026-06-30
          nullable: true
        id:
          type: string
          format: uuid
      required:
        - deliverySlotId
        - dayOfWeek
        - available
        - id
    AvailabilityListEnvelopeDto:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AvailabilityEntryResponseDto'
      required:
        - data
    AvailabilityEntryDto:
      type: object
      properties:
        deliverySlotId:
          type: string
          format: uuid
        dayOfWeek:
          type: number
          maximum: 6
          minimum: 0
        available:
          type: boolean
        validFrom:
          type: string
          example: 2026-06-15
          nullable: true
        validUntil:
          type: string
          example: 2026-06-30
          nullable: true
      required:
        - deliverySlotId
        - dayOfWeek
        - available
    AvailabilityUpdateDto:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/AvailabilityEntryDto'
      required:
        - entries
    CatalogVendorDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        campusId:
          type: string
          format: uuid
        displayName:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        kitchenLocation:
          type: string
          nullable: true
        defaultDeliveryMode:
          type: string
          enum:
            - meal_direct_rider
            - vendor_delivery
      required:
