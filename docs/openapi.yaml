          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorInventoryEnvelopeDto'
        '400':
          description: Invalid inventory quantity or stale state.
        '401': *a15
        '403': *a16
        '404':
          description: Inventory row was not found for this vendor.
      security: *a17
      tags: *a18
  /v1/vendor/inventory/{inventoryId}/adjustments:
    post:
      operationId: InventoryController_createAdjustment
