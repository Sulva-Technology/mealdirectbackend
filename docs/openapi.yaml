openapi: 3.0.0
paths:
  /v1/health/live:
    get:
      operationId: HealthController_live
      parameters: []
      responses:
        '200':
          description: The API process is running.
      tags: &a1
        - health
  /v1/health/ready:
    get:
      operationId: HealthController_ready
      parameters: []
      responses:
        '200':
          description: The API is ready to serve traffic.
        '503':
          description: A required dependency is unavailable.
      tags: *a1
  /v1/operations/status:
    get:
      operationId: OperationsController_status
      parameters: []
      responses:
        '200':
          description: Internal operational status for authorized administrators.
        '401':
          description: Operations token missing or invalid.
      security:
        - operationsToken: []
      tags:
        - operations
  /v1/auth/me:
    get:
      operationId: AuthController_me
      parameters: []
      responses:
        '200':
          description: The authenticated Meal Direct actor context.
        '401':
          description: Missing, invalid, or expired Supabase JWT.
      security:
        - supabaseAuth: []
      tags:
        - auth
  /v1/me:
    get:
      operationId: ProfilesController_me
      parameters: []
      responses:
        '200':
          description: Current role-aware Meal Direct session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeSessionEnvelopeDto'
        '401': &a2
          description: Missing, invalid, or expired Supabase JWT.
      security: &a3
        - supabaseAuth: []
      tags: &a4
        - me
    patch:
      operationId: ProfilesController_updateProfile
      parameters: []
      responses:
        '200':
          description: Updated safe profile fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileEnvelopeDto'
        '400':
          description: Invalid profile input.
        '401': *a2
      security: *a3
      tags: *a4
  /v1/me/campuses:
    get:
      operationId: ProfilesController_campuses
      parameters: []
      responses:
        '200':
          description: Active campus memberships for the current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampusMembershipListEnvelopeDto'
        '401': *a2
      security: *a3
      tags: *a4
  /v1/me/complete-onboarding:
    post:
      operationId: ProfilesController_completeOnboarding
      parameters: []
      responses:
        '200':
          description: Profile after onboarding completion.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileEnvelopeDto'
        '400':
          description: Invalid onboarding input.
        '401': *a2
        '403':
          description: User does not belong to the selected campus.
      security: *a3
      tags: *a4
  /v1/me/default-location:
    put:
      operationId: ProfilesController_setDefaultLocation
      parameters: []
      responses:
        '200':
          description: Profile after default location update.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileEnvelopeDto'
        '400':
          description: Invalid default location input.
        '401': *a2
        '403':
          description: User does not belong to the selected campus.
      security: *a3
      tags: *a4
  /v1/campuses:
    get:
      operationId: PublicCampusDirectoryController_listCampuses
      parameters: []
      responses:
        '200':
          description: Active campuses available to public clients.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampusListEnvelopeDto'
      tags: &a5
        - campuses
  /v1/campuses/{campusId}/locations:
    get:
      operationId: PublicCampusDirectoryController_listLocations
      parameters: []
      responses:
        '200':
          description: Active preset delivery locations for a campus.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationListEnvelopeDto'
        '400':
          description: Invalid campus ID.
      tags: *a5
  /v1/campuses/{campusId}/delivery-slots:
    get:
      operationId: PublicCampusDirectoryController_listDeliverySlots
      parameters: []
      responses:
        '200':
          description: Active delivery slots for a campus, optionally with date cutoffs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliverySlotListEnvelopeDto'
        '400':
          description: Invalid campus ID or date filter.
      tags: *a5
  /v1/admin/campuses:
    get:
      operationId: AdminCampusDirectoryController_listCampuses
      parameters: []
      responses:
        '200':
          description: Admin-visible campuses.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampusListEnvelopeDto'
        '401': &a6
          description: Missing, invalid, or expired Supabase JWT.
        '403': &a7
          description: Admin role is required.
      security: &a8
        - supabaseAuth: []
      tags: &a9
        - admin-campuses
    post:
      operationId: AdminCampusDirectoryController_createCampus
      parameters: []
      responses:
        '200':
          description: Created campus.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampusEnvelopeDto'
        '400':
          description: Invalid campus input.
        '401': *a6
        '403': *a7
      security: *a8
      tags: *a9
  /v1/admin/campuses/{campusId}:
    patch:
      operationId: AdminCampusDirectoryController_updateCampus
      parameters: []
      responses:
        '200':
          description: Updated campus.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampusEnvelopeDto'
        '400':
          description: Invalid campus input.
        '401': *a6
        '403': *a7
      security: *a8
      tags: *a9
  /v1/admin/campuses/{campusId}/zones:
    get:
      operationId: AdminCampusDirectoryController_listZones
      parameters: []
      responses:
        '200':
          description: Campus zones for admins.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZoneListEnvelopeDto'
        '401': *a6
        '403': *a7
      security: *a8
      tags: *a9
    post:
      operationId: AdminCampusDirectoryController_createZone
      parameters: []
      responses:
        '200':
          description: Created campus zone.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZoneEnvelopeDto'
        '401': *a6
        '403': *a7
      security: *a8
      tags: *a9
  /v1/admin/zones/{zoneId}:
    patch:
      operationId: AdminCampusDirectoryController_updateZone
      parameters: []
      responses:
        '200':
          description: Updated campus zone.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZoneEnvelopeDto'
        '401': *a6
        '403': *a7
      security: *a8
      tags: *a9
  /v1/admin/campuses/{campusId}/locations:
    get:
      operationId: AdminCampusDirectoryController_listLocations
      parameters: []
      responses:
        '200':
          description: Campus locations for admins.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationListEnvelopeDto'
        '401': *a6
        '403': *a7
      security: *a8
      tags: *a9
    post:
      operationId: AdminCampusDirectoryController_createLocation
      parameters: []
      responses:
        '200':
          description: Created campus location.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationEnvelopeDto'
        '401': *a6
        '403': *a7
      security: *a8
      tags: *a9
  /v1/admin/locations/{locationId}:
    patch:
      operationId: AdminCampusDirectoryController_updateLocation
      parameters: []
      responses:
        '200':
          description: Updated campus location.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationEnvelopeDto'
        '401': *a6
        '403': *a7
      security: *a8
      tags: *a9
  /v1/admin/campuses/{campusId}/delivery-slots:
    get:
      operationId: AdminCampusDirectoryController_listDeliverySlots
      parameters: []
      responses:
        '200':
          description: Campus delivery slots for admins.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliverySlotListEnvelopeDto'
        '401': *a6
        '403': *a7
      security: *a8
      tags: *a9
    post:
      operationId: AdminCampusDirectoryController_createDeliverySlot
      parameters: []
      responses:
        '200':
          description: Created campus delivery slot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliverySlotEnvelopeDto'
        '401': *a6
        '403': *a7
      security: *a8
      tags: *a9
  /v1/admin/delivery-slots/{slotId}:
    patch:
      operationId: AdminCampusDirectoryController_updateDeliverySlot
      parameters: []
      responses:
        '200':
          description: Updated campus delivery slot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliverySlotEnvelopeDto'
        '401': *a6
        '403': *a7
      security: *a8
      tags: *a9
  /v1/vendor/profile:
    get:
      operationId: VendorsController_getProfile
      parameters: []
      responses:
        '200':
          description: Current vendor profile and approval state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorProfileEnvelopeDto'
        '401': &a10
          description: Missing, invalid, or expired Supabase JWT.
        '403': &a11
          description: Vendor role and vendor membership are required.
      security: &a12
        - supabaseAuth: []
      tags: &a13
        - vendor
    patch:
      operationId: VendorsController_updateProfile
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVendorProfileDto'
      responses:
        '200':
          description: Updated safe vendor profile fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorProfileEnvelopeDto'
        '400':
          description: Invalid vendor profile input.
        '401': *a10
        '403': *a11
      security: *a12
      tags: *a13
  /v1/vendor/payout-account:
    get:
      operationId: VendorsController_getPayoutAccount
      parameters: []
      responses:
        '200':
          description: Current masked payout account snapshot, if configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorPayoutAccountEnvelopeDto'
        '401': *a10
        '403': *a11
      security: *a12
      tags: *a13
    put:
      operationId: VendorsController_updatePayoutAccount
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertPayoutAccountDto'
      responses:
        '200':
          description: Replaces the active payout account with a masked snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorPayoutAccountEnvelopeDto'
        '400':
          description: Invalid payout account input.
        '401': *a10
        '403': *a11
      security: *a12
      tags: *a13
  /v1/vendor/menu-metadata:
    get:
      operationId: VendorsController_getMenuMetadata
      parameters: []
      responses:
        '200':
          description: Vendor menu categories and active unit types.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuMetadataEnvelopeDto'
        '401': *a10
        '403': *a11
      security: *a12
      tags: *a13
  /v1/vendor/menu-items:
    get:
      operationId: VendorsController_listMenuItems
      parameters: []
      responses:
        '200':
          description: Vendor-owned menu items including inactive historical items.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorMenuItemListEnvelopeDto'
        '401': *a10
        '403': *a11
      security: *a12
      tags: *a13
    post:
      operationId: VendorsController_createMenuItem
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMenuItemDto'
      responses:
        '201':
          description: Created vendor-owned menu item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorMenuItemEnvelopeDto'
        '400':
          description: Invalid menu item input.
        '401': *a10
        '403': *a11
      security: *a12
      tags: *a13
  /v1/vendor/menu-items/{itemId}:
    get:
      operationId: VendorsController_getMenuItem
      parameters:
        - name: itemId
          required: true
          in: path
          schema:
            format: uuid
            type: string
      responses:
        '200':
          description: Vendor-owned menu item detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorMenuItemEnvelopeDto'
        '401': *a10
        '403': *a11
        '404':
          description: Menu item was not found for this vendor.
      security: *a12
      tags: *a13
    patch:
      operationId: VendorsController_updateMenuItem
      parameters:
        - name: itemId
          required: true
          in: path
          schema:
            format: uuid
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMenuItemDto'
      responses:
        '200':
          description: Updated vendor-owned menu item safe fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorMenuItemEnvelopeDto'
        '400':
          description: Invalid menu item input.
        '401': *a10
        '403': *a11
        '404':
          description: Menu item was not found for this vendor.
      security: *a12
      tags: *a13
  /v1/vendor/menu-items/{itemId}/activate:
    post:
      operationId: VendorsController_activateMenuItem
      parameters:
        - name: itemId
          required: true
          in: path
          schema:
            format: uuid
            type: string
      responses:
        '200':
          description: Activated a vendor-owned menu item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorMenuItemEnvelopeDto'
        '401': *a10
        '403': *a11
      security: *a12
      tags: *a13
  /v1/vendor/menu-items/{itemId}/deactivate:
    post:
      operationId: VendorsController_deactivateMenuItem
      parameters:
        - name: itemId
          required: true
          in: path
          schema:
            format: uuid
            type: string
      responses:
        '200':
          description: Deactivated a vendor-owned menu item without deleting history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorMenuItemEnvelopeDto'
        '401': *a10
        '403': *a11
      security: *a12
      tags: *a13
  /v1/vendor/menu-items/{itemId}/schedules:
    get:
      operationId: VendorsController_listMenuItemSchedules
      parameters:
        - name: itemId
          required: true
          in: path
          schema:
            format: uuid
            type: string
      responses:
        '200':
          description: Current slot availability for a vendor-owned menu item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityListEnvelopeDto'
        '401': *a10
        '403': *a11
      security: *a12
      tags: *a13
    put:
      operationId: VendorsController_replaceMenuItemSchedules
      parameters:
        - name: itemId
          required: true
          in: path
          schema:
            format: uuid
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvailabilityUpdateDto'
      responses:
        '200':
          description: Replaced slot availability for a vendor-owned menu item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityListEnvelopeDto'
        '400':
          description: Invalid menu item schedule input.
        '401': *a10
        '403': *a11
      security: *a12
      tags: *a13
  /v1/vendor/availability:
    get:
      operationId: VendorsController_listVendorAvailability
      parameters: []
      responses:
        '200':
          description: Vendor operating availability by delivery slot and day of week.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityListEnvelopeDto'
        '401': *a10
        '403': *a11
      security: *a12
      tags: *a13
    put:
      operationId: VendorsController_replaceVendorAvailability
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvailabilityUpdateDto'
      responses:
        '200':
          description: Replaced vendor operating availability by slot and day.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityListEnvelopeDto'
        '400':
          description: Invalid vendor availability input.
        '401': *a10
        '403': *a11
      security: *a12
      tags: *a13
  /v1/catalog/vendors:
    get:
      operationId: CatalogController_listVendors
      parameters: []
      responses:
        '200':
          description: Approved active vendors available for the selected campus/date/slot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogVendorListEnvelopeDto'
        '400':
          description: Invalid catalog filters.
      tags: &a14
        - catalog
  /v1/catalog/vendors/{vendorId}:
    get:
      operationId: CatalogController_getVendor
      parameters: []
      responses:
        '200':
          description: Approved active vendor detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogVendorEnvelopeDto'
        '400':
          description: Invalid vendor ID.
        '404':
          description: Vendor not found or unavailable.
