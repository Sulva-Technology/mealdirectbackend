        '200':
          description: Approved active menu items for the vendor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItemListEnvelopeDto'
        '400':
          description: Invalid vendor ID or menu filters.
      tags: *a14
  /v1/vendor/inventory:
    get:
      operationId: InventoryController_listInventory
      parameters: []
      responses:
        '200':
          description: Vendor-owned dated inventory for a service date and optional
            delivery slot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorInventoryListEnvelopeDto'
        '400':
          description: Invalid inventory filters.
        '401': &a15
          description: Missing, invalid, or expired Supabase JWT.
        '403': &a16
          description: Vendor role and vendor membership are required.
      security: &a17
        - supabaseAuth: []
      tags: &a18
        - vendor-inventory
  /v1/vendor/inventory/{inventoryId}:
    put:
      operationId: InventoryController_updateInventory
      parameters:
        - name: inventoryId
          required: true
          in: path
          schema:
            format: uuid
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInventoryDto'
      responses:
        '200':
          description: Updates the editable starting quantity for a vendor-owned inventory
