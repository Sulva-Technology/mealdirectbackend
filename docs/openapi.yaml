        - name: inventoryId
          required: true
          in: path
          schema:
            format: uuid
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInventoryAdjustmentDto'
      responses:
        '201':
          description: Records an append-only vendor inventory adjustment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryAdjustmentEnvelopeDto'
        '400':
          description: Invalid inventory adjustment.
        '401': *a15
        '403': *a16
        '404':
          description: Inventory row was not found for this vendor.
      security: *a17
      tags: *a18
  /v1/orders/quote:
