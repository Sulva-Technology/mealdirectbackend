name: ci-cd

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Formatting check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit and integration coverage
        run: pnpm test:coverage

      - name: No skipped critical tests
        run: node scripts/check-critical-tests.mjs

      - name: Build
        run: pnpm build

      - name: OpenAPI drift check
        run: pnpm openapi:check

      - name: Dependency audit
        run: pnpm audit --audit-level high

      - name: Container build
        run: docker build -t meal-direct-api:${{ github.sha }} .

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Supabase
        run: pnpm supabase:start

      - name: Reset database
        run: pnpm db:reset

      - name: Database tests
        run: pnpm db:test

      - name: Production database gates
        run: pnpm test:production
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

      - name: Lint migrations
        run: pnpm db:lint

      - name: Generate types
        run: pnpm db:types

      - name: Schema diff check
        run: pnpm db:diff:check

  staging-smoke:
    if: github.ref == 'refs/heads/main'
    needs:
      - api
      - database
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Staging smoke tests
        run: pnpm smoke:api
        env:
          SMOKE_BASE_URL: ${{ secrets.STAGING_API_BASE_URL }}
          SMOKE_FRONTEND_ORIGINS: ${{ secrets.STAGING_FRONTEND_ORIGINS }}
