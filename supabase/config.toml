project_id = "meal-direct"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000",
  "http://localhost:3001",
  "http://localhost:3002",
  "http://localhost:3003",
  "https://user.mealdirectly.com/auth/callback",
  "https://vendor.mealdirectly.com/auth/callback",
  "https://rider.mealdirectly.com/auth/callback"
]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.email.template.confirmation]
subject = "Confirm your MealDirectly email"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.magic_link]
subject = "Your MealDirectly sign-in link"
content_path = "./supabase/templates/magic_link.html"

[auth.email.template.recovery]
subject = "Reset your MealDirectly password"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.invite]
subject = "You're invited to MealDirectly"
content_path = "./supabase/templates/invite.html"

[auth.email.template.email_change]
subject = "Confirm your new MealDirectly email"
content_path = "./supabase/templates/email_change.html"

[auth.email.template.reauthentication]
subject = "Your MealDirectly verification code"
content_path = "./supabase/templates/reauthentication.html"

[auth.external.google]
enabled = false
client_id = ""
secret = ""
redirect_uri = ""

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 54327
