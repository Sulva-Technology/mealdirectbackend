services:
  - type: web
    name: meal-direct-api
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /v1/health/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: true
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_ISSUER
        sync: false
      - key: SUPABASE_JWT_AUDIENCE
        value: authenticated
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      # Master switch for automated Paystack payouts (POST /admin/settlements/:id/pay).
      # Leave false to disable; set true only when Paystack transfers are live and the
      # transfer webhook is configured.
      - key: PAYOUTS_ENABLED
        value: true
      - key: INTERNAL_OPERATIONS_TOKEN
        sync: false
      # Outbox draining runs inline in this web process (see src/main.ts).
      # RESEND_API_KEY is already required for prod boot; FCM_* enable push.
      - key: RESEND_API_KEY
        sync: false
      - key: FCM_PROJECT_ID
        sync: false
      - key: FCM_CLIENT_EMAIL
        sync: false
      - key: FCM_PRIVATE_KEY
        sync: false
      - key: RELEASE_VERSION
        sync: false
      - key: COMMIT_SHA
        sync: false
  - type: cron
    name: meal-direct-release-expired-reservations
    runtime: docker
    schedule: '*/5 * * * *'
    dockerfilePath: ./Dockerfile
    dockerCommand: node dist/cron.js release-expired-reservations
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: true
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_ISSUER
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      # Required by production env validation (env.ts superRefine); the cron boots the
      # full AppModule + parseEnvironment(), so a missing value crashes the job on start.
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: INTERNAL_OPERATIONS_TOKEN
        sync: false
  - type: cron
    name: meal-direct-close-batches
    runtime: docker
    schedule: '*/10 * * * *'
    dockerfilePath: ./Dockerfile
    dockerCommand: node dist/cron.js close-batches-at-cutoff
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: true
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_ISSUER
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      # Required by production env validation (env.ts superRefine); the cron boots the
      # full AppModule + parseEnvironment(), so a missing value crashes the job on start.
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: INTERNAL_OPERATIONS_TOKEN
        sync: false
  - type: cron
    name: meal-direct-reconcile-payments
    runtime: docker
    schedule: '*/2 * * * *'
    dockerfilePath: ./Dockerfile
    dockerCommand: node dist/cron.js reconcile-pending-payments
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: true
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_ISSUER
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      # Required by production env validation (env.ts superRefine); the cron boots the
      # full AppModule + parseEnvironment(), so a missing value crashes the job on start.
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: INTERNAL_OPERATIONS_TOKEN
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
